<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/photo-2026-07-07-12-41-58-no-bg-preview-carve-photos.png">
    <title>Meneo</title>
</head>
<body>
    <div class="header">
        <h1>MENEO</h1>
        <div class="logo-wrapper">
            <img src="images/photo-2026-07-07-12-41-58-no-bg-preview-carve-photos.png" alt="logo" class="header-logo">
        </div>
        <h3 class="header_text">Пролистывайте вниз чтобы увидеть подробности</h3>
        <img src="images/arrow.png" alt="" class="arrow">
    </div>
    <div class="main_container">
        <h2>Meneo 💙 — современный Telegram-бот для <br>знакомств. Ищи людей по интересам, <br>знакомься, общайся и находи тех, с кем <br>хочется быть рядом</h2>
    </div>
    <h2 class="Creator">Создатель wnxlss</h2>
    <div class="btn_container">
        <button type="button" class="btn cyan">
            <img src="images/comment-2-text.svg" alt="">
            <a href="https://t.me/meneotg">Telegram</a>
        </button>
        <button type="button" class="btn blue">
            <img src="images/users.svg" alt="">
            <a href="https://t.me/meneosup_bot">Поддержка</a>
        </button>
        <button type="button" class="btn purple">
            <img src="images/credit-card (1).svg" alt="">
            <a href="https://www.tbank.ru/cf/5EKgKjoH7Ml">Поддержать проект</a>
        </button>
    </div>
    <h6>© 2026 Meneo. Все права защищены.</h6>
    <script>
        window.addEventListener('scroll', function() {
            const headerBlock = document.querySelector('.header');
            
            const scrollPosition = window.scrollY;
            
            let opacity = 1 - (scrollPosition / 100);
            
            if (opacity < 0) {
                opacity = 0;
            }

            if (headerBlock) {
                headerBlock.style.opacity = opacity;
                headerBlock.style.pointerEvents = opacity === 0 ? 'none' : 'auto';
            }
        });
        const textElement = document.querySelector('.main_container h2');
        const text = textElement.textContent;
        textElement.textContent = '';
        
        let i = 0;
        function type() {
            if (i < text.length) {
                textElement.textContent += text.charAt(i);
                i++;
                setTimeout(type, 80);
            }
        }
        type();
        const headerBlock = document.querySelector('.header');
        const logoImg = document.querySelector('.header-logo');

        if (headerBlock && logoImg) {
            headerBlock.addEventListener('mousemove', (e) => {
                const rect = headerBlock.getBoundingClientRect();

                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;

                const rotateX = -y / 15; 
                const rotateY = x / 15;

                logoImg.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
            });

            headerBlock.addEventListener('mouseleave', () => {
                logoImg.style.transition = 'transform 0.5s ease';
                logoImg.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
            });

            headerBlock.addEventListener('mouseenter', () => {
                logoImg.style.transition = 'transform 0.1s ease-out';
            });
        }
    </script>
</body>
</html>
